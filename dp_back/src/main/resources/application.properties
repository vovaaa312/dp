spring.application.name=dp_back
server.port=${SERVER_PORT:8080}

# AI service base URL (override via env: AI_BASE_URL)
ai.service.base-url=${AI_BASE_URL:http://localhost:8000}

# Shared data directory (override via env: DATA_DIR)
app.data-dir=${DATA_DIR:/data}

# PostgreSQL datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${APP_JWT_SECRET:5a7134743777217a25432a46294a404e635266556a586e3272357538782f413f}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Multipart file upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Logging
logging.level.org.dp_back=DEBUG
